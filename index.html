// ── Helpers ─────────────────────────────────────────────────────────────────────
function govColor(s){ if(!s) return C.dim; if(s.includes("🔴")) return C.red; if(s.includes("🟡")) return C.amber; if(s.includes("🟢")) return C.green; return C.dim; }

// ── Small Components ──────────────────────────────────────────────────────────────
function Badge({level}) {
  const m = {Einstieg:{bg:C.green+"18",c:C.green},Einsteiger:{bg:C.green+"18",c:C.green},Mittel:{bg:C.violet+"15",c:C.violet},Fortgeschritten:{bg:C.magenta+"15",c:C.magenta},Management:{bg:C.teal+"15",c:C.teal}};
  const key = Object.keys(m).find(k=>(level||"").includes(k));
  const s = m[key]||{bg:"#eee",c:C.muted};
  return html`<span style=${{background:s.bg,color:s.c,border:`1px solid ${s.c}30`,padding:"2px 8px",borderRadius:20,fontSize:10,fontWeight:700}}>${level}</span>`;
}

function GovBadge({level,derived}) {
  const c = govColor(level);
  return html`<span style=${{display:"inline-flex",alignItems:"center",gap:4,background:c+"15",color:c,border:`1px solid ${c}33`,padding:"2px 9px",borderRadius:20,fontSize:10,fontWeight:800}}>${level}${derived?html`<span title="aus dem Governance-Schema abgeleitet – bitte fachlich prüfen" style=${{fontSize:9,opacity:.85}}>· abgeleitet</span>`:""}</span>`;
}

function CopyBtn({text}) {
  const [done,setDone] = useState(false);
  const go = (e) => { e.stopPropagation(); navigator.clipboard.writeText(text).catch(()=>{}); setDone(true); setTimeout(()=>setDone(false),2000); };
  return html`<button onClick=${go} style=${{background:done?C.green+"20":"#f0f0f0",border:`1px solid ${done?C.green+"44":C.border}`,color:done?C.green:C.muted,borderRadius:5,padding:"3px 9px",cursor:"pointer",fontSize:10,fontWeight:700,whiteSpace:"nowrap",flexShrink:0,transition:"all .2s"}}>
    ${done?"✓ Kopiert":"📋 Kopieren"}
  </button>`;
}

function PromptCard({p}) {
  const [open,setOpen] = useState(false);
  return html`<div style=${{border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden",marginBottom:7}}>
    <div onClick=${()=>setOpen(!open)} style=${{background:C.surface2,padding:"9px 13px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
      <div style=${{display:"flex",alignItems:"center",gap:7}}>
        <span style=${{color:C.magenta,fontSize:12}}>${open?"▾":"▸"}</span>
        <span style=${{fontWeight:700,fontSize:12}}>${p.label}</span>
      </div>
      <${CopyBtn} text=${p.text}/>
    </div>
    ${open && html`<pre style=${{margin:0,padding:"12px 14px",background:C.surface,fontSize:11.5,lineHeight:1.65,color:C.text,whiteSpace:"pre-wrap",fontFamily:"'Inter',sans-serif",borderTop:`1px solid ${C.border}`}}>${p.text}</pre>`}
  </div>`;
}

  const [open,setOpen] = useState(false);

            {t:"Datenklassifizierung",col:C.amber,items:["🟢 Unkritisch: öffentliche Infos, allgemeine Texte","🟡 Eingeschränkt: interne Inhalte nur in freigegebenen Tools","🔴 Kritisch: personenbezogene/vertrauliche Daten → nicht in externe Tools"]},
            {t:"Tool-Governance",col:C.teal,items:["Freigegeben: von der Organisation geprüfte/interne Tools","Eingeschränkt: externe Tools nur ohne sensible Daten","Nicht freigegeben: Tools ohne Freigabe oder Prüfung"]},
            {t:"Qualitätsprüfung",col:C.green,items:["Stimmen Inhalte fachlich?","Sind Zahlen korrekt?","Sind Annahmen gekennzeichnet?","Ist die Quelle nachvollziehbar?"]},
            {t:"Typische Risiken",col:C.red,items:["falsche Zusammenfassungen","falsche Zahleninterpretation","scheinbar logische, aber falsche Argumente"]},
            {t:"Organisation",col:C.violet,items:["Wer gibt Tools frei?","Wer pflegt Inhalte (z. B. ChatBot-Factory)?","Wer verantwortet Use Cases?","Wer schult Mitarbeitende?"]},
          ].map(card=>html`<div key=${card.t} style=${{background:C.surface,border:`1px solid ${C.border}`,borderTop:`3px solid ${card.col}`,borderRadius:11,padding:"16px 18px"}}>
            <h3 style=${{margin:"0 0 10px",fontWeight:800,fontSize:13.5,color:card.col}}>${card.t}</h3>
            ${card.items.map((x,i)=>html`<div key=${i} style=${{display:"flex",gap:7,marginBottom:5}}><span style=${{color:card.col,flexShrink:0}}>•</span><span style=${{fontSize:12,lineHeight:1.55,color:C.text}}>${x}</span></div>`)}
          </div>`)}
        </div>
        <div style=${{borderLeft:`4px solid ${C.magenta}`,background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 18px",marginTop:14}}>
          <span style=${{fontSize:13,color:C.text,lineHeight:1.7}}><strong>Use-Case-bezogene Governance:</strong> Jeder Use Case trägt eine eigene Ampel sowie Hinweise, „Wann nicht nutzen" und einen Qualitätscheck – sichtbar im Tab „Governance" der jeweiligen Karte.</span>
        </div>
      </div>`}

    </div>
  </div>`;
}

ReactDOM.createRoot(document.getElementById("root")).render(html`<${App}/>`);
</script>
</body>
</html>
